<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Twitter Supabase</title>
</head>
<body>
<h2>Mini Twitter</h2>

<textarea id="tweetInput" placeholder="Digite seu tweet..."></textarea><br>
<button onclick="postTweet()">Tweetar</button>

<h3>Timeline</h3>
<div id="timeline"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.26.0/dist/supabase.min.js"></script>
<script>
  // ❌ Substitua pelos dados do seu projeto
  const SUPABASE_URL = "https://zsyddrlpbpvugnkrsyzr.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzeWRkcmxwYnB2dWdua3JzeXpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MTkxMDEsImV4cCI6MjA4OTE5NTEwMX0.unlN8MJKjUs92K9Osk5J-b3-1-PHZdpv3HcwCzd9b6Q";

  const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function loadTweets(){
    let { data: tweets, error } = await supabase
      .from('tweets')
      .select('*')
      .order('created_at', { ascending: false });

    if(error){ console.log(error); return; }

    const timeline = document.getElementById('timeline');
    timeline.innerHTML = '';

    tweets.forEach(t => {
      const div = document.createElement('div');
      div.innerHTML = `<b>${t.user}</b>: ${t.text} <i>(${new Date(t.created_at).toLocaleString()})</i>`;
      timeline.appendChild(div);
    });
  }

  async function postTweet(){
    const input = document.getElementById('tweetInput');
    const text = input.value.trim();
    if(!text) return;

    const { data, error } = await supabase
      .from('tweets')
      .insert([{ user: "Usuário", text: text }]);

    if(error){ console.log(error); return; }

    input.value = '';
    loadTweets();
  }

  loadTweets();

  // Atualiza automaticamente a timeline a cada 3s
  setInterval(loadTweets, 3000);
</script>
</body>
</html>
