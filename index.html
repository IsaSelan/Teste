<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Twitter Supabase</title>
<style>
body{font-family:Segoe UI, Arial;margin:20px;}
textarea{width:100%;height:60px;margin-bottom:10px;padding:10px;border-radius:8px;}
button{padding:8px 15px;border-radius:8px;background:#1da1f2;color:white;border:none;cursor:pointer;}
.tweet{border:1px solid #ddd;padding:10px;margin-bottom:10px;border-radius:8px;}
</style>
</head>
<body>

<h2>Mini Twitter Literário</h2>
<textarea id="tweetInput" placeholder="Digite seu tweet..."></textarea><br>
<button onclick="postTweet()">Tweetar</button>

<h3>Timeline</h3>
<div id="timeline"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.26.0/dist/supabase.min.js"></script>
<script>
  // ❌ Cole aqui a URL e anon key do seu projeto Supabase
  const SUPABASE_URL = "https://zsyddrlpbpvugnkrsyzr.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzeWRkcmxwYnB2dWdua3JzeXpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MTkxMDEsImV4cCI6MjA4OTE5NTEwMX0.unlN8MJKjUs92K9Osk5J-b3-1-PHZdpv3HcwCzd9b6Q";

  const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Função para carregar tweets
  async function loadTweets(){
    const { data: tweets, error } = await supabase
      .from('tweets')
      .select('*')
      .order('created_at', { ascending: false });

    if(error){ console.log(error); return; }

    const timeline = document.getElementById('timeline');
    timeline.innerHTML = '';

    tweets.forEach(t => {
      const div = document.createElement('div');
      div.className = 'tweet';
      div.innerHTML = `<b>${t.user}</b>: ${t.text} <br><small>${new Date(t.created_at).toLocaleString()}</small>`;
      timeline.appendChild(div);
    });
  }

  // Função para postar tweet
  async function postTweet(){
    const input = document.getElementById('tweetInput');
    const text = input.value.trim();
    if(!text) return;

    const { data, error } = await supabase
      .from('tweets')
      .insert([{ user: "Usuário", text: text }]);

    if(error){ console.log(error); return; }

    input.value = '';
    loadTweets();
  }

  // Carregar inicialmente e atualizar a cada 3s
  loadTweets();
  setInterval(loadTweets, 3000);
</script>
</body>
</html>
